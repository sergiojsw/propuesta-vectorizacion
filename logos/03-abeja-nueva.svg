<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">
  <title>Abeja Lineal - Diseño Original</title>

  <!-- Definiciones -->
  <defs>
    <!-- Patrón para nervaduras de alas -->
    <g id="nervadura">
      <line x1="0" y1="0" x2="30" y2="15" stroke="#333" stroke-width="1.5"/>
    </g>
  </defs>

  <!-- Grupo principal centrado -->
  <g fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

    <!-- === ALAS GRANDES (traseras, dibujadas primero) === -->
    <!-- Ala izquierda grande -->
    <ellipse cx="95" cy="115" rx="85" ry="35" transform="rotate(-25 95 115)" fill="none"/>
    <!-- Nervaduras ala izquierda -->
    <line x1="50" y1="95" x2="20" y2="80" stroke-width="1.5"/>
    <line x1="70" y1="105" x2="35" y2="95" stroke-width="1.5"/>
    <line x1="90" y1="115" x2="55" y2="110" stroke-width="1.5"/>
    <line x1="80" y1="130" x2="45" y2="135" stroke-width="1.5"/>

    <!-- Ala derecha grande -->
    <ellipse cx="305" cy="115" rx="85" ry="35" transform="rotate(25 305 115)" fill="none"/>
    <!-- Nervaduras ala derecha -->
    <line x1="350" y1="95" x2="380" y2="80" stroke-width="1.5"/>
    <line x1="330" y1="105" x2="365" y2="95" stroke-width="1.5"/>
    <line x1="310" y1="115" x2="345" y2="110" stroke-width="1.5"/>
    <line x1="320" y1="130" x2="355" y2="135" stroke-width="1.5"/>

    <!-- === ALAS PEQUEÑAS (delanteras) === -->
    <!-- Ala izquierda pequeña -->
    <ellipse cx="135" cy="145" rx="45" ry="20" transform="rotate(-15 135 145)" fill="none"/>
    <line x1="110" y1="140" x2="95" y2="135" stroke-width="1.2"/>
    <line x1="120" y1="150" x2="100" y2="150" stroke-width="1.2"/>

    <!-- Ala derecha pequeña -->
    <ellipse cx="265" cy="145" rx="45" ry="20" transform="rotate(15 265 145)" fill="none"/>
    <line x1="290" y1="140" x2="305" y2="135" stroke-width="1.2"/>
    <line x1="280" y1="150" x2="300" y2="150" stroke-width="1.2"/>

    <!-- === PATAS (3 pares con simetría espejo) === -->
    <!-- Patas izquierdas (originales) -->
    <g id="patas-izquierda">
      <!-- Par superior -->
      <path d="M165 155 Q150 140 135 150 Q120 160 105 150" stroke-width="2"/>
      <!-- Par medio -->
      <path d="M160 175 Q140 175 125 185 Q110 195 95 190" stroke-width="2"/>
      <!-- Par inferior -->
      <path d="M170 220 Q155 230 145 250 Q135 270 120 280" stroke-width="2"/>
    </g>

    <!-- Patas derechas (espejo exacto de las izquierdas) -->
    <use href="#patas-izquierda" transform="translate(400,0) scale(-1,1)"/>

    <!-- === CUERPO === -->

    <!-- ABDOMEN (parte inferior) -->
    <ellipse cx="200" cy="240" rx="55" ry="70" fill="none"/>

    <!-- Rayas del abdomen (5 bandas) -->
    <path d="M155 200 Q200 195 245 200" stroke-width="8" stroke="#1a1a1a"/>
    <path d="M150 225 Q200 220 250 225" stroke-width="8" stroke="#1a1a1a"/>
    <path d="M152 250 Q200 245 248 250" stroke-width="8" stroke="#1a1a1a"/>
    <path d="M158 275 Q200 270 242 275" stroke-width="8" stroke="#1a1a1a"/>
    <path d="M170 295 Q200 292 230 295" stroke-width="6" stroke="#1a1a1a"/>

    <!-- TÓRAX (parte media) -->
    <ellipse cx="200" cy="150" rx="45" ry="35" fill="none"/>

    <!-- Textura del tórax (pelitos) -->
    <g stroke-width="1.2">
      <line x1="175" y1="125" x2="172" y2="145"/>
      <line x1="185" y1="122" x2="183" y2="142"/>
      <line x1="195" y1="120" x2="195" y2="140"/>
      <line x1="205" y1="120" x2="205" y2="140"/>
      <line x1="215" y1="122" x2="217" y2="142"/>
      <line x1="225" y1="125" x2="228" y2="145"/>

      <line x1="170" y1="145" x2="168" y2="165"/>
      <line x1="180" y1="148" x2="178" y2="168"/>
      <line x1="190" y1="150" x2="190" y2="170"/>
      <line x1="200" y1="150" x2="200" y2="172"/>
      <line x1="210" y1="150" x2="210" y2="170"/>
      <line x1="220" y1="148" x2="222" y2="168"/>
      <line x1="230" y1="145" x2="232" y2="165"/>
    </g>

    <!-- CABEZA -->
    <ellipse cx="200" cy="95" rx="35" ry="28" fill="none"/>

    <!-- OJOS (óvalos inclinados) -->
    <ellipse cx="180" cy="85" rx="12" ry="18" transform="rotate(-20 180 85)" fill="#1a1a1a"/>
    <ellipse cx="220" cy="85" rx="12" ry="18" transform="rotate(20 220 85)" fill="#1a1a1a"/>

    <!-- Brillos en los ojos -->
    <ellipse cx="176" cy="80" rx="4" ry="6" transform="rotate(-20 176 80)" fill="#fff"/>
    <ellipse cx="216" cy="80" rx="4" ry="6" transform="rotate(20 216 80)" fill="#fff"/>

    <!-- ANTENAS -->
    <path d="M185 70 Q175 50 170 35 Q168 25 175 20" fill="none" stroke-width="2.5"/>
    <path d="M215 70 Q225 50 230 35 Q232 25 225 20" fill="none" stroke-width="2.5"/>

  </g>
</svg>
